<svg width="1600" height="400" viewBox="0 0 1600 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Andres Arevalo, Full-Stack Software Developer, Vancouver BC</title>
<desc>A terminal-window style banner. A whoami command outputs the name Andres Arevalo, followed by a comment line reading Full-Stack Software Developer, Vancouver BC, and a code line declaring a stack array of Kotlin, TypeScript, NestJS, Next.js, and Azure.</desc>
<defs>
<clipPath id="round"><rect x="0" y="0" width="1600" height="400" rx="14"/></clipPath>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
<circle cx="2" cy="2" r="1" fill="#1B2236"/>
</pattern>
</defs>
<g clip-path="url(#round)">
<rect x="0" y="0" width="1600" height="400" fill="#0A0E1A"/>
<rect x="0" y="52" width="1600" height="348" fill="url(#dots)" opacity="0.55"/>
<text x="1430" y="300" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-weight="700" font-size="220" fill="#1E3A5F" opacity="0.4">&lt;/&gt;</text>
<rect x="0" y="0" width="1600" height="52" fill="#11162A"/>
<line x1="0" y1="52" x2="1600" y2="52" stroke="#1F2740" stroke-width="1"/>
<circle cx="32" cy="26" r="7" fill="#FF5F57"/>
<circle cx="56" cy="26" r="7" fill="#FFBD2E"/>
<circle cx="80" cy="26" r="7" fill="#28C840"/>
<text x="800" y="31" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-size="14" fill="#7C8696">andres@vancouver — zsh</text>
<text x="80" y="130" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-size="22">
<tspan fill="#4EC9B0">$</tspan>
<tspan fill="#9CA3AF" dx="10">whoami</tspan>
</text>
<text x="80" y="195" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-weight="700" font-size="56" fill="#F1F5F9">Andres Arevalo</text>
<text x="80" y="250" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-size="24" fill="#6A9955">// Full-Stack Software Developer · Vancouver, BC</text>
<text x="80" y="310" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-size="22">
<tspan fill="#569CD6">const</tspan>
<tspan fill="#9CDCFE" dx="8">stack</tspan>
<tspan fill="#D4D4D4" dx="8">=</tspan>
<tspan fill="#D4D4D4" dx="8">[</tspan>
<tspan fill="#CE9178">"Kotlin"</tspan><tspan fill="#D4D4D4">,</tspan>
<tspan fill="#CE9178" dx="6">"TypeScript"</tspan><tspan fill="#D4D4D4">,</tspan>
<tspan fill="#CE9178" dx="6">"NestJS"</tspan><tspan fill="#D4D4D4">,</tspan>
<tspan fill="#CE9178" dx="6">"Next.js"</tspan><tspan fill="#D4D4D4">,</tspan>
<tspan fill="#CE9178" dx="6">"Azure"</tspan>
<tspan fill="#D4D4D4">];</tspan>
</text>
<text x="80" y="360" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-size="22" fill="#4EC9B0">$</text>
<rect x="100" y="342" width="13" height="24" fill="#F1F5F9">
<animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite" calcMode="discrete"/>
</rect>
</g>
<rect x="0.5" y="0.5" width="1599" height="399" rx="14" fill="none" stroke="#1F2740" stroke-width="1"/>
</svg>
